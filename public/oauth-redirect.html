<!DOCTYPE html>
<html>
<head>
  <title>Authenticating...</title>
</head>
<body>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    
    if (accessToken) {
      window.opener.postMessage({ type: 'oauth_success', response: { access_token: accessToken } }, window.location.origin);
    } else {
      window.opener.postMessage({ type: 'oauth_error', error: 'No access token found' }, window.location.origin);
    }
    window.close();
  </script>
</body>
</html>
